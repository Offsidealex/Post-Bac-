// ---- Helpers ----
function badge(valide) {
  return valide
    ? `<span class="badge valide">VALIDÉ</span>`
    : `<span class="badge nonvalide">NON VALIDÉ</span>`;
}

function lvCell(levels) {
  const cls = { "A2":"lv-a2","B1":"lv-b1","B1+":"lv-b1p","B2":"lv-b2","N/É":"lv-ne" };
  return `<div class="lva-grid">${LVA_KEYS.map((k,i) =>
    `<span class="lva-key">${k}</span><span class="lva-val ${cls[levels[i]]||'lv-ne'}">${levels[i]}</span>`
  ).join('')}</div>`;
}

function avisHtml(a) {
  if (a === "positif") return `<span class="avis-positif">Positif</span>`;
  if (a === "reserve") return `<span class="avis-reserve">Réservé</span>`;
  return `<span class="avis-neutre">Pas d'avis</span>`;
}

function cohHtml(c) {
  if (c === "forte") return `<span class="forte">Forte cohérence</span>`;
  return `<span class="cond">Cohérence conditionnelle</span>`;
}

// ---- Build table ----
const SCORE_LABELS_V = ["Écrit","Oral","Lecture","Compréh."];
const SCORE_LABELS_M = ["Repré.","Démarche","Docs","Synthèse"];
const SCORE_LABELS_T = ["Planifier","Mémoriser","Méthodes","Autonomie"];
const SCORE_LABELS_A = ["Éco/Pro","Métiers","Engagement","Démarches"];
const SCORE_LABELS_I = ["Stages","Outils","PFMP","Adapt."];
const SCORE_LABELS_P = ["C10.4","C12.3","C2.3","C5.6","C6.2","C7.2"];

function scoreStr(labels, scores) {
  return labels.map((l,i) => `${l}:${scores[i]}`).join(' · ');
}

function subCell(blk, scoreLabels) {
  return `<td>${badge(blk.v)}<span class="scores">${scoreStr(scoreLabels, blk.s)}</span></td>`;
}
